  if(m.length) h+=`<div class="meta">${m.join("　")}</div>`;
  if(s.cautions) h+=`<div class="cau">⚠️ ${esc(s.cautions)}</div>`;
  h+=`<div><a class="go" href="${esc(s.maps_url)}" target="_blank" rel="noopener">🗺️ Google Maps 導航</a>`;
  if(s.source_url) h+=`<a class="src" href="${esc(s.source_url)}" target="_blank" rel="noopener">來源↗</a>`;
  return h+`</div></div>`;
}
function match(s){
  const d = curDay==="all" || (s.days||[]).includes(curDay);
  const c = curCat==="all" || (CATS.find(x=>x.k===curCat)?.reach ? s.reachable===curCat : s.category===curCat);
  return d && c;
}
const ORD = {"團體行程":0,"住宿":1};
function render(){
  layer.clearLayers();
  const list=[],pts=[];
  SP.forEach((s,i)=>{ if(!match(s))return; list.push({s,i}); if(markers[i]){layer.addLayer(markers[i]);pts.push([s.lat,s.lon]);} });
  list.sort((a,b)=>{const oa=ORD[a.s.category]??2,ob=ORD[b.s.category]??2; if(oa!==ob)return oa-ob;
    if(a.s.time&&b.s.time)return a.s.time.localeCompare(b.s.time); return 0;});
  if(pts.length){ try{ map.fitBounds(pts,{padding:[45,45],maxZoom:14}); }catch(e){} }
  const sh=document.getElementById("sheet");
  let html=`<div class="cnt">共 ${list.length} 個點（${DAYS.find(d=>d.k===curDay).label}）· 🚩必跟團排最前並標時間 · 點卡片會在地圖定位</div>`;
  list.forEach(({s,i})=>{
    const cm=CAT[s.category]||{e:"📍",c:"#64748b"},dl=distLine(s);
    const rowcls=s.category==="團體行程"?" grp":(s.category==="住宿"?" htl":"");
    let badge="";
    if(s.category==="團體行程") badge=`<span class="badge tbadge">${esc(s.time||"必跟")}</span>`;
    else if(s.category==="住宿") badge=`<span class="badge hbadge">${esc(s.nights||"住宿")}</span>`;
    else badge=`<span class="badge rb ${RB[s.reachable]||"car"}">${esc(s.reachable)}</span>`;
    html+=`<div class="row${rowcls}" data-i="${i}"><div class="dot" style="background:${cm.c}">${cm.e}</div>`+
      `<div class="txt"><div class="nm">${esc(s.name_zh)}</div><div class="sub">${esc(s.name_local)}</div>`+
      badge+(s.why?` <span class="sub" style="white-space:normal">· ${esc(s.why)}</span>`:``)+
      (s.category==="住宿"&&s.reach_note?` <span class="sub" style="white-space:normal">· ${esc(s.reach_note)}</span>`:``)+
      (dl.length?`<div class="dist">${dl.map(x=>`<span>${x}</span>`).join("")}</div>`:``)+
      `</div></div>`;
  });
  html+=`<div>`+acc("💡 整體建議",D.summary,true)+acc("🚗 交通現實（沒車能玩到哪）",D.transportReality,false)+acc("🤿 7 月浮潛安全鐵律",D.snorkelSafety,false)+`</div>`;
  sh.innerHTML=html;
  sh.querySelectorAll(".row").forEach(r=>r.onclick=()=>{const i=+r.dataset.i,m=markers[i];
    if(m){map.setView(m.getLatLng(),15,{animate:true});m.openPopup();}else{window.open(SP[i].maps_url,"_blank");}});
}
function acc(t,b,open){return `<details class="acc"${open?" open":""}><summary>${esc(t)}</summary><div class="b">${esc(b)}</div></details>`;}
const tabsEl=document.getElementById("tabs");
DAYS.forEach((d,i)=>{const b=document.createElement("button");b.className="tab"+(i===0?" on":"");b.textContent=d.label;
  b.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));b.classList.add("on");curDay=d.k;render();};tabsEl.appendChild(b);});
const catsEl=document.getElementById("cats");
CATS.forEach((c,i)=>{const b=document.createElement("button");b.className="cat"+(i===0?" on":"");b.textContent=c.label;
  b.onclick=()=>{document.querySelectorAll(".cat").forEach(x=>x.classList.remove("on"));b.classList.add("on");curCat=c.k;render();};catsEl.appendChild(b);});
document.getElementById("loc").onclick=(e)=>{e.stopPropagation();
  if(!navigator.geolocation){alert("此裝置不支援定位");return;}
  navigator.geolocation.getCurrentPosition(p=>{const ll=[p.coords.latitude,p.coords.longitude];
    L.circleMarker(ll,{radius:8,color:"#38bdf8",fillColor:"#38bdf8",fillOpacity:.9}).addTo(map).bindPopup("你在這裡").openPopup();
    map.setView(ll,14);},()=>alert("無法取得定位（請允許定位權限）"),{enableHighAccuracy:true,timeout:8000});};
render();
</script>
</body>
</html>
