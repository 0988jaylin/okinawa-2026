:root{

.grp>.gsub{color:var(--muted);font-size:.85rem;margin:0 0 12px;white-space:pre-wrap}

.zh{font-weight:700;font-size:1.06rem;line-height:1.3}
.jp{color:var(--muted);font-size:.82rem;margin-top:1px}

.reach.r-walk{background:var(--walkbg);color:var(--walk);border-color:#bbf7d0}

.reach.r-car{background:#f3f4f6;color:#6b7280;border-color:#e5e7eb}
.cat{background:#f8fafc;color:#334155;border-color:#e2e8f0}
.chip.warn{background:var(--warnbg);color:var(--warn);border-color:#fed7aa}
.reachnote{font-size:.85rem;color:var(--muted);margin:2px 0 8px}
.why{margin:6px 0;font-size:.95rem}
.note{margin:6px 0;font-size:.88rem;padding:8px 10px;border-radius:9px}
.note.snorkel{background:#f0fdfa;border:1px solid #ccfbf1}
.note.photo{background:#faf5ff;border:1px solid #eaddff}
.meta{display:flex;gap:14px;flex-wrap:wrap;color:var(--muted);font-size:.83rem;margin:8px 0 2px}
.caution{font-size:.82rem;color:var(--warn);background:var(--warnbg);border-radius:9px;padding:8px 10px;margin:8px 0 2px}
a.src{font-size:.78rem;color:var(--accent2);text-decoration:none;display:inline-block;margin-top:8px}
.empty{color:var(--muted);text-align:center;padding:30px 0}
footer{color:var(--muted);font-size:.78rem;text-align:center;margin-top:30px;padding-top:16px;border-top:1px solid var(--line)}

  .cat{background:#232d38;color:#c7d2dd;border-color:#33404b}
  .fbtn,.nchip{background:#1a222c}
}
</style>

幾個點能舒服玩。那覇靠 ゆいレール 單軌最方便（1日券 ¥800、2日 ¥1,400，機場-首里全覆蓋），栄町市場/公設市場/壺屋/平和通り全在飯店步行 6-15 分內；波の上ビーチ是全島唯一『單軌＋步行可達』的海灘。一出那覇，路線巴士班次與站點驟減——美ら海、古宇利、南部各聖地（斎場御嶽/新原/玉泉洞）、海中道路一帶純靠巴士非常吃力且回程易卡末班；美國村因在國道58號幹線、巴士相對頻繁較好到（20/28/29/120等），コザ 從那覇巴士約60分。比賽場地(金武東岸)與飯店(恩納西岸)之間、以及北部(7/6)全程強烈建議租車；若不租車，點狀移動可用觀光計程車談定額包車（沖繩計程車比本島便宜，隊上多人攤下來划算）。務必先備日本 eSIM（挑走 au/KDDI 網訊號最穩）落地即開導航；傳統市場、海灘停車/淋浴多只收現金，隨身帶日圓零錢。", "snorkelSafety": "7月是浮潛旺季（水溫 28-29°C、能見度高），但也是三重風險期：箱型水母 ハブクラゲ 高峰（6-9月，7-8月最兇）＋7月中起颱風季＋珊瑚礁區離岸流（リーフカレント）強。鐵律：①優先選有『防水母網＋監視員』的管理海灘、只在網內游；②穿水母衣/長袖防磨衣遮膚（布料多能擋螫）＋務必穿救生衣或浮力帶；③勿越過礁緣往深水或外海；④飲酒後不下水、絕不單獨下水、結伴同行；⑤下水前查當日潮汐與海況，颱風接近浪大就放棄。分區提醒：金武 KINサンライズビーチ官方明文禁止浮潛（僅戲水）；那覇 波の上ビーチ禁止自帶裝備自由浮潛（只能參加業者體驗）。想真正看珊瑚：飯店自家海灘（有マリンショップ較安全）、北部備瀬崎/ゴリラチョップ/古宇利トケイ浜、中部砂辺・宮城海岸、南部新原ビーチ——但這些多為免費自然海岸『無網、無監視員、風險全自負』，7月更要全套防護。真榮田岬藍洞務必跟團、勿自行前往。", "_stats": {"total": 50, "walk": 16, "snorkel": 8}}</script>
<script>
const D = JSON.parse(document.getElementById("data").textContent);
const CAT = {
  "浮潛":{e:"🤿"},"海灘戲水":{e:"🏖️"},"街頭攝影":{e:"📷"},"景點參觀":{e:"⛩️"},
  "在地美食":{e:"🍜"},"咖啡休息":{e:"☕"},"購物":{e:"🛍️"}
};
const REACH = {
  "步行可達":{e:"🚶",c:"r-walk"},"巴士可達":{e:"🚌",c:"r-bus"},
  "單車或短程":{e:"🚲",c:"r-bike"},"需開車或計程車":{e:"🚗",c:"r-car"}
};
const FILTERS = [
  {label:"全部",val:"all"},
  {label:"🚶 步行可達",val:"步行可達",type:"reach"},
  {label:"🤿 浮潛",val:"浮潛",type:"cat"},
  {label:"🏖️ 海灘",val:"海灘戲水",type:"cat"},
  {label:"📷 街拍",val:"街頭攝影",type:"cat"},
  {label:"⛩️ 景點",val:"景點參觀",type:"cat"},
  {label:"🍜 美食",val:"在地美食",type:"cat"}
];
const esc = s => (s==null?"":String(s)).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));

// stats
const st = D._stats||{};
document.getElementById("stats").innerHTML =
  `<span class="stat"><b>${st.total||0}</b> 個景點</span>`+
  `<span class="stat">🚶 步行可達 <b>${st.walk||0}</b></span>`+
  `<span class="stat">🤿 浮潛點 <b>${st.snorkel||0}</b></span>`;

// info blocks
const info = document.getElementById("info");
info.innerHTML =
  `<div class="alert"><b>⚠️ 先看這個：</b>大本營飯店（ホテルみゆきビーチ）實際在<b>恩納村西岸</b>，比賽場地在<b>金武町東岸</b>，兩地車程約 30–40 分、分屬本島東西兩側。想「帶浮潛裝隨時跳海看珊瑚」的黃金點是<b>飯店自家海灘</b>；比賽場地那側最近的 KIN サンライズビーチ<b>官方禁止浮潛</b>（只能戲水）。</div>`+
  detail("💡 整體建議",D.summary,true)+
  detail("🚗 交通現實（沒車能玩到哪）",D.transportReality,false)+
  detail("🤿 7 月浮潛安全鐵律",D.snorkelSafety,false);
function detail(t,body,open){
  return `<details class="info"${open?" open":""}><summary>${esc(t)}</summary><div class="body">${esc(body)}</div></details>`;
}

// filters
const fbar = document.getElementById("filters");
FILTERS.forEach((f,i)=>{
  const b=document.createElement("button");
  b.className="fbtn"+(i===0?" on":""); b.textContent=f.label; b.dataset.val=f.val; b.dataset.type=f.type||"";
  b.onclick=()=>{document.querySelectorAll(".fbtn").forEach(x=>x.classList.remove("on"));b.classList.add("on");applyFilter(f);};
  fbar.appendChild(b);
});

// nav
const nav=document.getElementById("nav");
D.sections.forEach((s,i)=>{
  const a=document.createElement("a"); a.className="nchip"; a.textContent=s.title;
  a.href="#sec"+i; nav.appendChild(a);
});

// sections
const main=document.getElementById("main");
D.sections.forEach((s,i)=>{
  const sec=document.createElement("section"); sec.className="grp"; sec.id="sec"+i;
  sec.innerHTML=`<h2>${esc(s.title)}</h2><p class="gsub">${esc(s.subtitle||"")}</p>`;
  (s.spots||[]).forEach(sp=>sec.appendChild(card(sp)));
  main.appendChild(sec);
});

function card(sp){
  const el=document.createElement("article"); el.className="card";
  el.dataset.cat=sp.category||""; el.dataset.reach=sp.reachable||"";
  const cm=CAT[sp.category]||{e:"📍"}; const rm=REACH[sp.reachable]||{e:"📍",c:"r-car"};
  let h=`<div class="card-head"><div class="titles"><div class="zh">${esc(sp.name_zh)}</div>`+
    `<div class="jp">${esc(sp.name_local)}</div></div>`+
    (sp.maps_url?`<a class="maps" href="${esc(sp.maps_url)}" target="_blank" rel="noopener">🗺️ 地圖</a>`:``)+
    `</div>`;
  h+=`<div class="chips"><span class="chip cat">${cm.e} ${esc(sp.category)}</span>`+
     `<span class="chip reach ${rm.c}">${rm.e} ${esc(sp.reachable)}</span>`+
     (sp.confidence&&sp.confidence!=="high"?`<span class="chip warn">信心 ${esc(sp.confidence)}</span>`:``)+`</div>`;
  if(sp.reach_note) h+=`<div class="reachnote">📍 ${esc(sp.reach_note)}</div>`;
  if(sp.why) h+=`<p class="why">${esc(sp.why)}</p>`;
  if(sp.snorkel_note) h+=`<p class="note snorkel">🤿 ${esc(sp.snorkel_note)}</p>`;
  if(sp.photo_note) h+=`<p class="note photo">📷 ${esc(sp.photo_note)}</p>`;
  let meta=[];
  if(sp.best_time) meta.push(`🕐 ${esc(sp.best_time)}`);
  if(sp.cost) meta.push(`💴 ${esc(sp.cost)}`);
  if(meta.length) h+=`<div class="meta">${meta.map(m=>`<span>${m}</span>`).join("")}</div>`;
  if(sp.cautions) h+=`<p class="caution">⚠️ ${esc(sp.cautions)}</p>`;
  if(sp.source_url) h+=`<a class="src" href="${esc(sp.source_url)}" target="_blank" rel="noopener">來源 ↗</a>`;
  el.innerHTML=h; return el;
}

function applyFilter(f){
  document.querySelectorAll(".card").forEach(c=>{
    let show=true;
    if(f.val!=="all"){
      show = f.type==="reach" ? c.dataset.reach===f.val : c.dataset.cat===f.val;
    }
    c.style.display=show?"":"none";
  });
  document.querySelectorAll("section.grp").forEach(sec=>{
    const any=[...sec.querySelectorAll(".card")].some(c=>c.style.display!=="none");
    sec.style.display=any?"":"none";
  });
}
</script>
</body>
</html>
